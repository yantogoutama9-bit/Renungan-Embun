<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan & Quotes Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #8b7355;
            --accent: #d4a574;
            --bg: #faf8f5;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #5d6d7e;
            --shadow: rgba(0,0,0,0.08);
            --error: #e74c3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 165, 116, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%);
            color: white;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.03) 10px,
                rgba(255,255,255,0.03) 20px
            );
            animation: shimmer 20s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        header p {
            opacity: 0.9;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .date-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .date-btn {
            background: var(--card);
            border: 2px solid var(--accent);
            color: var(--secondary);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--shadow);
            font-size: 1em;
        }

        .date-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.3);
        }

        .date-btn.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .date-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .current-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: var(--secondary);
            font-weight: 600;
            min-width: 300px;
            text-align: center;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (min-width: 968px) {
            .content-grid {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px var(--shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(139, 115, 85, 0.2);
        }

        .icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            color: var(--primary);
        }

        .card-subtitle {
            color: var(--text-light);
            font-size: 0.9em;
            margin-top: 2px;
        }

        .renungan-content h3 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            font-size: 1.3em;
            margin-bottom: 15px;
            font-style: italic;
        }

        .verse {
            background: linear-gradient(135deg, #f8f4f0, #f0e9e2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--secondary);
            font-size: 1.1em;
            line-height: 1.8;
        }

        .intro {
            background: rgba(212, 165, 116, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: var(--text-light);
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .intro::before {
            content: 'Intro';
            display: block;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8em;
        }

        .content-text {
            line-height: 1.8;
            color: var(--text);
            text-align: justify;
        }

        .content-text p {
            margin-bottom: 15px;
        }

        .quote-card {
            background: linear-gradient(135deg, var(--primary), #2c3e50);
            color: white;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .quote-card::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 150px;
            opacity: 0.1;
            line-height: 1;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            line-height: 1.6;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        .quote-author {
            text-align: right;
            opacity: 0.8;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .quotes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mini-quote {
            background: rgba(44, 62, 80, 0.05);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid var(--accent);
            transition: all 0.3s ease;
        }

        .mini-quote:hover {
            background: rgba(44, 62, 80, 0.1);
            transform: translateX(5px);
        }

        .mini-quote-text {
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 8px;
            font-style: italic;
            color: var(--text);
        }

        .mini-quote-source {
            font-size: 0.8em;
            color: var(--text-light);
            text-align: right;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 115, 85, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--secondary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .refresh-btn:hover {
            transform: scale(1.1) rotate(180deg);
            background: var(--accent);
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .card {
                padding: 25px;
            }
            
            .quote-text {
                font-size: 1.1em;
            }
            
            .date-nav {
                gap: 10px;
            }
            
            .date-btn {
                padding: 10px 16px;
                font-size: 0.9em;
            }
            
            .current-date {
                font-size: 1.1em;
                min-width: auto;
                order: -1;
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Renungan & Quotes Harian</h1>
        <p>Renungan Embun Pagi & Quotes Hari Ini</p>
    </header>

    <div class="container">
        <div class="date-nav">
            <button class="date-btn" id="btnPrev" onclick="changeDate(-1)">
                <span>←</span> Kemarin
            </button>
            <div class="current-date" id="currentDate"></div>
            <button class="date-btn" id="btnNext" onclick="changeDate(1)">
                Besok <span>→</span>
            </button>
            <button class="date-btn" id="btnToday" onclick="goToToday()">
                Hari Ini
            </button>
        </div>

        <div class="content-grid">
            <div class="card" id="renunganCard">
                <div class="card-header">
                    <div class="icon">📖</div>
                    <div>
                        <div class="card-title">Renungan Embun Pagi</div>
                        <div class="card-subtitle">Sumber ROC</div>
                    </div>
                </div>
                <div id="renunganContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat renungan...</p>
                    </div>
                </div>
            </div>

            <div class="card" id="quotesCard">
                <div class="card-header">
                    <div class="icon" style="background: linear-gradient(135deg, #2c3e50, #34495e);">💬</div>
                    <div>
                        <div class="card-title">Quotes Hari Ini</div>
                        <div class="card-subtitle">Sumber GSKI</div>
                    </div>
                </div>
                <div id="quotesContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat quotes...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshData()" title="Refresh Data">↻</button>

    <script>
        // ============================================
        // KONFIGURASI - EDIT DI SINI
        // ============================================
        
        // GANTI DENGAN API KEY GROQ ANDA
        const GROQ_API_KEY = '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';
        
        // Model Groq yang digunakan
        const GROQ_MODEL = 'llama3-70b-8192';
        
        // ============================================
        
        let currentDate = new Date();
        let isLoading = false;

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateDisplay(date) {
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            return date.toLocaleDateString('id-ID', options);
        }

        function setLoading(loading) {
            isLoading = loading;
            const buttons = document.querySelectorAll('.date-btn');
            buttons.forEach(btn => {
                btn.disabled = loading;
            });
            
            if (loading) {
                document.getElementById('renunganContent').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat renungan...</p>
                    </div>
                `;
                document.getElementById('quotesContent').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Memuat quotes...</p>
                    </div>
                `;
            }
        }

        function showError(message) {
            const errorHTML = `
                <div class="error-message fade-in">
                    <p><strong>Terjadi Kesalahan</strong></p>
                    <p>${message}</p>
                    <p style="margin-top: 10px; font-size: 0.9em;">Silakan periksa API Key dan koneksi internet Anda.</p>
                </div>
            `;
            document.getElementById('renunganContent').innerHTML = errorHTML;
            document.getElementById('quotesContent').innerHTML = errorHTML;
        }

        async function fetchFromGroq(dateStr) {
            const prompt = `Buatkan renungan harian Kristen dan quotes untuk tanggal ${dateStr}.

Format respons HARUS dalam JSON valid seperti ini:
{
    "renungan": {
        "title": "Judul Renungan Oswald Chambers style",
        "verse": "Referensi Ayat (contoh: Yohanes 3:16)",
        "verseText": "Teks ayat lengkap",
        "intro": "Paragraf intro singkat 2-3 kalimat",
        "content": "Isi renungan 3-4 paragraf, dalam bahasa Indonesia yang dalam dan rohani"
    },
    "quotes": [
        {
            "text": "Quote rohani 1",
            "author": "Rehobot Church"
        },
        {
            "text": "Quote rohani 2",
            "author": "Rehobot Church"
        },
        {
            "text": "Quote rohani 3",
            "author": "Rehobot Church"
        }
    ]
}

Kriteria:
1. Renungan bergaya Oswald Chambers (My Utmost for His Highest) - dalam, teologis, menantang
2. Quotes bergaya Rehobot Church - singkat, powerful, menginspirasi
3. Tema harus sesuai dengan tanggal ${dateStr} (misal: hari spesial, musim, atau siklus renungan)
4. Gunakan bahasa Indonesia yang elegan dan rohani
5. Ayat harus dari Alkitab (TB)

Respons HANYA JSON, tanpa markdown, tanpa penjelasan tambahan.`;

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [
                        {
                            role: 'system',
                            content: 'Anda adalah penulis renungan Kristen yang menghasilkan konten rohani berkualitas tinggi dalam format JSON.'
                        },
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'Gagal mengambil data dari Groq');
            }

            const data = await response.json();
            const content = data.choices[0].message.content;
            
            // Parse JSON dari respons
            try {
                // Bersihkan jika ada markdown code block
                const cleanContent = content.replace(/```json\n?|\n?```/g, '').trim();
                return JSON.parse(cleanContent);
            } catch (e) {
                console.error('JSON Parse Error:', content);
                throw new Error('Format respons tidak valid');
            }
        }

        async function renderContent() {
            const dateStr = formatDate(currentDate);
            const displayDate = formatDateDisplay(currentDate);
            
            document.getElementById('currentDate').textContent = displayDate;
            
            setLoading(true);
            
            try {
                const data = await fetchFromGroq(dateStr);
                
                // Render Renungan
                const renungan = data.renungan;
                document.getElementById('renunganContent').innerHTML = `
                    <div class="renungan-content fade-in">
                        <h3>${renungan.title}</h3>
                        <div class="verse">
                            <strong>${renungan.verse}</strong><br>
                            ${renungan.verseText}
                        </div>
                        <div class="intro">${renungan.intro}</div>
                        <div class="content-text">
                            ${renungan.content.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                        </div>
                    </div>
                `;
                
                // Render Quotes
                const quotes = data.quotes;
                const featuredQuote = quotes[0];
                const otherQuotes = quotes.slice(1);
                
                document.getElementById('quotesContent').innerHTML = `
                    <div class="fade-in">
                        <div class="quote-card">
                            <div class="quote-text">${featuredQuote.text}</div>
                            <div class="quote-author">— ${featuredQuote.author}</div>
                        </div>
                        <div class="quotes-list">
                            ${otherQuotes.map(q => `
                                <div class="mini-quote">
                                    <div class="mini-quote-text">"${q.text}"</div>
                                    <div class="mini-quote-source">— ${q.author}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                // Update button state
                const today = new Date();
                const isToday = dateStr === formatDate(today);
                const btnToday = document.getElementById('btnToday');
                
                if (isToday) {
                    btnToday.classList.add('active');
                } else {
                    btnToday.classList.remove('active');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
            } finally {
                setLoading(false);
            }
        }

        function changeDate(days) {
            if (isLoading) return;
            const newDate = new Date(currentDate);
            newDate.setDate(newDate.getDate() + days);
            currentDate = newDate;
            renderContent();
        }

        function goToToday() {
            if (isLoading) return;
            currentDate = new Date();
            renderContent();
        }

        function refreshData() {
            if (isLoading) return;
            renderContent();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (GROQ_API_KEY === 'gsk_your_api_key_here') {
                document.getElementById('renunganContent').innerHTML = `
                    <div class="error-message fade-in">
                        <p><strong>API Key Belum Diatur</strong></p>
                        <p>Silakan edit file ini dan masukkan API Key Groq Anda di bagian KONFIGURASI.</p>
                    </div>
                `;
                document.getElementById('quotesContent').innerHTML = `
                    <div class="error-message fade-in">
                        <p><strong>API Key Belum Diatur</strong></p>
                        <p>Dapatkan API Key gratis di: https://console.groq.com</p>
                    </div>
                `;
            } else {
                renderContent();
            }
        });
    </script>
</body>
</html>
